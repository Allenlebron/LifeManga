    fill="white"
    text-anchor="middle"
    dominant-baseline="central"
  >漫</text>
  <!-- 右上小型装饰星 -->
  <circle cx="420" cy="92" r="14" fill="white" opacity="0.85"/>
  <circle cx="450" cy="62" r="6" fill="white" opacity="0.7"/>
